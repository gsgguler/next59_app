name: Regenerate Sitemap

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main  # Bolt'tan yaptığın her değişiklikte otomatik çalışması için eklendi

permissions:
  contents: write

jobs:
  sitemap:
    runs-on: ubuntu-latest
    env:
      # GitHub'ın duyurduğu Node 24 zorunluluğunu sisteme bildirmek için:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Artık güvenle 24 kullanabilirsin
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate sitemap
        env:
          # Secret'ları VITE_ olarak tekrar tanımladığın için bu kısım artık çalışacak
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run generate:sitemap

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/sitemap.xml public/robots.txt
          # Değişiklik varsa commit at ve pushla, yoksa hata verme
          git diff --cached --quiet || (git commit -m "chore: regenerate sitemap [skip ci]" && git push)
